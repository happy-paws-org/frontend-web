name: Frontend Web CI

on:
  push:
    branches:
      - develop
      - main
  pull_request:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/frontend-web

jobs:

# ---------------------------------------------------
# JOB 1 - Prepare SHA Tag
# ---------------------------------------------------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set SHA Image Tag
        id: tag
        run: |
          echo "image_tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

# ---------------------------------------------------
# JOB 2 - SonarQube Scan
# ---------------------------------------------------
  sonar-scan:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - uses: actions/checkout@v4

      - name: Sonar Config
        run: |
          echo "sonar.projectKey=${GITHUB_REPOSITORY_OWNER}:frontend-web" > sonar-project.properties
          echo "sonar.projectName=frontend-web" >> sonar-project.properties
          echo "sonar.sources=src" >> sonar-project.properties

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

# ---------------------------------------------------
# JOB 3 - Sonar Failure Email
# ---------------------------------------------------
  sonar-failure-mail:
    runs-on: ubuntu-latest
    needs: sonar-scan
    if: failure()

    steps:
      - name: Send Sonar Failure Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: SonarQube Failed - Frontend Web
          to: ${{ secrets.ALERT_EMAIL }}
          from: ${{ secrets.EMAIL_USERNAME }}
          body: SonarQube scan failed.

# ---------------------------------------------------
# JOB 4 - Snyk Scan
# ---------------------------------------------------
  snyk-scan:
    runs-on: ubuntu-latest
    needs: sonar-scan

    steps:
      - uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test || true

      - name: Run Build
        run: npm run build

      - name: Run Snyk Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

# ---------------------------------------------------
# JOB 5 - Snyk Failure Email
# ---------------------------------------------------
  snyk-failure-mail:
    runs-on: ubuntu-latest
    needs: snyk-scan
    if: failure()

    steps:
      - name: Send Snyk Failure Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Snyk Failed - Frontend Web
          to: ${{ secrets.ALERT_EMAIL }}
          from: ${{ secrets.EMAIL_USERNAME }}
          body: Snyk scan failed.

# ---------------------------------------------------
# JOB 6 - Docker Build
# ---------------------------------------------------
  docker-build:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - snyk-scan

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t $IMAGE_NAME:${{ needs.prepare.outputs.image_tag }} .

# ---------------------------------------------------
# JOB 7 - Trivy Scan
# ---------------------------------------------------
  trivy-scan:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - docker-build

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t $IMAGE_NAME:${{ needs.prepare.outputs.image_tag }} .

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.image_tag }}
          severity: HIGH,CRITICAL
          exit-code: 1

# ---------------------------------------------------
# JOB 8 - Trivy Failure Email
# ---------------------------------------------------
  trivy-failure-mail:
    runs-on: ubuntu-latest
    needs: trivy-scan
    if: failure()

    steps:
      - name: Send Trivy Failure Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Trivy Failed - Frontend Web
          to: ${{ secrets.ALERT_EMAIL }}
          from: ${{ secrets.EMAIL_USERNAME }}
          body: Trivy scan failed.

# ---------------------------------------------------
# JOB 9 - Push Image
# ---------------------------------------------------
  push-image:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - trivy-scan
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t $IMAGE_NAME:${{ needs.prepare.outputs.image_tag }} .

      - name: Login GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push Image
        run: docker push $IMAGE_NAME:${{ needs.prepare.outputs.image_tag }}

# ---------------------------------------------------
# JOB 10 - Success Email
# ---------------------------------------------------
  success-mail:
    runs-on: ubuntu-latest
    needs: push-image
    if: success() && github.event_name == 'push'

    steps:
      - name: Send Success Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Frontend Web Image Pushed Successfully
          to: ${{ secrets.ALERT_EMAIL }}
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            Docker image pushed successfully to GHCR.

            Image Tag: ${{ needs.prepare.outputs.image_tag }}